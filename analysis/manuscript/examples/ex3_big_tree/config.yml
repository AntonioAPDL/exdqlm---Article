example_id: ex3_big_tree
article_section: sec:ex3
title: Big Tree monthly flow with NOI/AMO dynamic regression and transfer function
script: run.R
parameter_source: analysis/config/params_manuscript.yml#profiles.*.ex3
primary_target: ex3
targets:
  all: ex3
  data_figure: ex3data
  quantile_components: ex3quantcomps
  transfer_states: ex3zetapsi
  forecast: ex3forecast
  manuscript_tables: ex3tables
  legacy_ldvb_aliases: ex3quantcomps_ldvb,ex3forecast_ldvb,ex3tables_ldvb
notes:
  - This is the only manuscript-facing Big Tree workflow.
  - The response is the observed USGS monthly-average BTflow dataset shipped by exdqlm.
  - The manuscript covariates are standardized NOI and AMO from the package climateIndices dataset.
  - The manuscript component figure focuses on 2016--2020, while the transfer-state figure keeps the full fitted span.
  - The forecast figure displays the final holdout window from 2020 forward.
  - Older Big Tree alternatives are preserved under analysis/support/.
  - Keep precipitation and soil moisture out of the manuscript workflow unless the paper decision changes.
run_commands:
  standard: Rscript analysis/run_all.R --stage manuscript --targets ex3 --profile standard --skip-tests
  tests: Rscript analysis/run_all.R --stage manuscript --tests-only
